server.port=9090

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always

logging.level.ru.practicum.shareit=debug

# FOR DEBUG
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.use_sql_comments=true

logging.level.org.springframework.orm.jpa=INFO
logging.level.org.springframework.transaction=INFO
logging.level.org.springframework.transaction.interceptor=TRACE
logging.level.org.springframework.orm.jpa.JpaTransactionManager=DEBUG

#---
spring.datasource.driverClassName=org.postgresql.Driver
#docker:
#spring.datasource.url=jdbc:postgresql://localhost:5432/ewm-stats
#local:
spring.datasource.url=jdbc:postgresql://localhost:6431/stats_server
spring.datasource.username=stats_user
spring.datasource.password=stats_pass

